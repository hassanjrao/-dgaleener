<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/activity.css">
    <link rel="stylesheet" href="css/signin.css">

    <title>Anew Avenue Biomagnetism</title>
</head>
<body class="container-fluid">
<div id="container">
    <section class="header">
        <div class="row row-1"></div>
        <div class="row row-2">
            <div class="col-md-12 text-center">
                <h3>Signin</h3>
            </div>
        </div>


        <div class="row row-3">

            <div class="col-md-1"></div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/profile24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Profile</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/activity24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Activity</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/friendicon24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Friend</div>
            </a>
            </div>

            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/groupicon24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Group</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/notification24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Notification</div>
            </a>
            </div>
            <div class="col-md-1"></div>
        </div>
        <div class="row row-3"></div>
    </section>


    <div class="container main-body-sign">
        <div class="row">
            <div class="form_bg ">
                <form>
                    <div class="form-group">
                        <input type="email" class="form-control form-rounded" id="userid" placeholder="Email id"
                               style="opacity: 0.4;">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control form-rounded" id="pwd" placeholder="Password"
                               style="opacity: 0.4;">
                    </div>
                    <br/>
                    <div class="align-center">
                        <button type="submit" class="btn btn-default form-rounded" id="login">Sign in</button>
                    </div>
                    <div class="form-group text-center">
                        <div class="checkbox">
                            <label>
                                <input type="checkbox">Remember me</a>
                            </label>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="#">Forgot Password ?</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</section>
<section class="footer" id="footer">
    <footer>
        <div class="row main-body-down">
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\home80.png" class="footer-images"></a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\human-180.png"
                                                              class="footer-images"></a></div>
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\human80.png" class="footer-images"></a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\briefcase80.png"
                                                              class="footer-images"></a></div>
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\share80.png" class="footer-images"></a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\more80.png" class="footer-images"></a>
            </div>
        </div>
    </footer>

</section>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="js/jquery-3.3.1.slim.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script>
    $('.btn.btn-link.collapsed').click(function () {
        $('.card-header').removeClass('active');

        //If the panel was open and would be closed by this click, do not active it
        if (!$(this).closest('.card').find('.collapse').hasClass('show'))
            $(this).parents('.card-header').addClass('active');
    });
</script>
</body>
</html></html>
