<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bioprofile.css">

    <title>Anew Avenue Biomagnetism</title>
</head>
<body class="container-fluid">
<div id="container">
    <section class="header">
        <div class="row row-1"></div>
        <div class="row row-2">
            <div class="col-md-12 text-center">
                <h3>BioConnect <img src="images/iconimages/share24.png" class="responsive1"></h3>
            </div>
        </div>


        <div class="row row-3">

            <div class="col-md-1"></div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/profile24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Profile</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/activity24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Activity</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/friendicon24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Friend</div>
            </a>
            </div>

            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/groupicon24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Group</div>
            </a>
            </div>
            <div class="col-md-2 text-center"><a href=""><img src="images/iconimages/notification24.png"
                                                              class="headerimageicon">
                <div class="headericontext">Notification</div>
            </a>
            </div>
            <div class="col-md-1"></div>
        </div>
        <div class="row row-3"></div>
    </section>


    <div class="row main-body">

        <div class="col-md-6 text-center">
            <a href=""><img src="images\iconimages\profileimage.jpg" class="profile-image"></a>
        </div>
        <div class="col-md-6 privacy-button">
            <div class="row">
                <div class="col-md-2 text-right"><span>Privacy</span></div>
                <div class="col-md-10"><label class="switch"><input type="checkbox" id="togBtn">
                    <div class="slider round"></div>
                </label></div>
            </div>
            <div class="row">
                <div class="col-md-10 offset-md-1"> Only for business and email</div>
                <div class="col-md-10 offset-md-1">Name and location will show</div>
            </div>

        </div>


    </div>

    <div class="row" id="personal-info">
        <div class="col-md-6">
            <form>
                <div class="form-group row">
                    <label for="name" class="col-sm-1 offset-md-2 col-form-label">Name:</label>
                    <div class="col-sm-7">
                        <input type="text" class="form-control" id="name" value="your name here">
                    </div>
                </div>
                <div class="form-group row">
                    <label for="business" class="col-sm-1 offset-md-2 col-form-label">Business:</label>
                    <div class="col-sm-7">
                        <input type="text" class="form-control" id="business" value="your business name here">
                    </div>
                </div>
                <div class="form-group row">
                    <label for="email" class="col-sm-1 offset-md-2 col-form-label">Email:</label>
                    <div class="col-sm-7">
                        <input type="email" class="form-control" id="email" value="your email here">
                    </div>
                </div>
                <div class="form-group row">
                    <label for="location" class="col-sm-1 offset-md-2 col-form-label">Location:</label>
                    <div class="col-sm-7">
                        <input type="text" class="form-control" id="location" value="your location here">
                    </div>
                </div>

            </form>
        </div>
        <div class="col-md-6"></div>
    </div>
    </section>
    <section class="footer" id="footer">
        <footer>
            <div class="row main-body-down">
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\home80.png"
                                                                  class="footer-images"></a></div>
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\human-180.png"
                                                                  class="footer-images"></a></div>
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\human80.png"
                                                                  class="footer-images"></a></div>
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\briefcase80.png"
                                                                  class="footer-images"></a></div>
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\share80.png"
                                                                  class="footer-images"></a></div>
                <div class="col-md-2 text-center"><a href=""><img src="images\iconimages\more80.png"
                                                                  class="footer-images"></a></div>
            </div>
        </footer>

    </section>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="js/jquery-3.3.1.slim.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.min.js"></script>
</body>
</html>
